<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Viewer</title>
    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial, sans-serif;
            background: #0b0f14;
            color: #e7edf5;
            display: grid;
            place-items: center;
            min-height: 100vh;
        }

        .card {
            width: min(680px, 92vw);
            background: linear-gradient(180deg, #111827, #0f172a);
            border: 1px solid #223049;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        p {
            color: #9fb0c5;
            line-height: 1.5;
        }

        a.button {
            display: inline-block;
            margin-top: 12px;
            padding: 12px 18px;
            border-radius: 12px;
            background: #2f81f7;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        code {
            color: #7dd3fc;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>USB Camera Viewer</h1>
    <p>This landing page is generic. The current default stream is <code>main-camera</code>. Pass <code>?src=your_stream_name</code> only if you intentionally changed the deployment config.</p>
    <a class="button" id="webrtc-link" href="webrtc.html?src=main-camera">Open WebRTC Viewer</a>
    <a class="button" id="snapshot-link" href="snapshot.html?src=main-camera" style="margin-left: 10px; background: #0f766e;">Open Snapshot Viewer</a>
    <a class="button" href="main-camera.html" style="margin-left: 10px; background: #2563eb;">Open Stable Main Camera Entry</a>
    <a class="button" href="main-camera-video.html" style="margin-left: 10px; background: #1d4ed8;">Open Pure Video Entry</a>
</div>
<script>
    const params = new URLSearchParams(location.search);
    const streamName = params.get('src') || 'main-camera';
    document.getElementById('webrtc-link').href = `webrtc.html?src=${encodeURIComponent(streamName)}`;
    document.getElementById('snapshot-link').href = `snapshot.html?src=${encodeURIComponent(streamName)}`;
</script>
</body>
</html>
