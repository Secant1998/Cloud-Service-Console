<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Main Camera Viewer</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #e5eef8;
            font-family: Segoe UI, Arial, sans-serif;
        }

        body {
            display: grid;
            place-items: center;
        }

        .panel {
            width: min(640px, calc(100vw - 40px));
            padding: 24px;
            border-radius: 18px;
            background: rgba(12, 18, 28, 0.92);
            border: 1px solid rgba(125, 211, 252, 0.24);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 26px;
        }

        p {
            margin: 0 0 14px;
            line-height: 1.5;
            color: #a9b9cb;
        }

        a {
            color: #7dd3fc;
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>Main Camera Entry</h1>
    <p>Redirecting to the stable WebRTC viewer for <code>main-camera</code>...</p>
    <p>If redirect does not start automatically, open <a href="webrtc.html?src=main-camera">webrtc.html?src=main-camera</a>.</p>
</div>
<script>
    location.replace('webrtc.html?src=main-camera');
</script>
</body>
</html>
